name: PlayerStats
version: 1.0.0
main: ru.anarchyserver.playerstats.PlayerStats
api-version: 1.20
authors: [AnarchyServer]
description: RPG-система прокачки персонажа — убивай мобов, получай опыт, становись сильнее!

commands:
  stats:
    description: Показать свою статистику
    usage: /stats
    permission: playerstats.use
  statsadmin:
    description: Административные команды PlayerStats
    usage: /statsadmin <reload|setlevel|addexp|reset|bloodmoon>
    permission: playerstats.admin

permissions:
  playerstats.use:
    description: Доступ к команде /stats
    default: true
  playerstats.admin:
    description: Доступ к административным командам
    default: op
