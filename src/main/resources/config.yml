# ╔══════════════════════════════════════╗
# ║       PlayerStats - config.yml       ║
# ╚══════════════════════════════════════╝

# Максимальный уровень игрока
max-level: 85

# Бонус здоровья за каждый уровень (2 = 1 сердце)
hp-per-level: 0.5

# Бонус урона за каждый уровень
damage-per-level: 0.1

# Показывать сообщение о полученном опыте после каждого убийства?
show-exp-gain: true

# Активна ли Кровавая Луна? (x5 опыта)
# Управляется командой: /statsadmin bloodmoon <on/off>
bloodmoon-active: false

